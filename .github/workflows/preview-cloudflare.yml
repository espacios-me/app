name: Preview deploy to Cloudflare

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PREVIEW_WORKER_NAME: atom-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Deploy preview with Wrangler
        run: pnpm exec wrangler deploy --name "$PREVIEW_WORKER_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Add workflow summary
        run: |
          echo "## Cloudflare preview deployed" >> $GITHUB_STEP_SUMMARY
          echo "Worker name: \`$PREVIEW_WORKER_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "This preview deploy is separate from production and is recreated on each PR update." >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with preview details
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              'Cloudflare preview deployed.',
              '',
              `Worker name: \`${process.env.PREVIEW_WORKER_NAME}\``,
              '',
              'This preview is isolated from production and updates on each push to this PR.'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Cloudflare preview deployed.')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          PREVIEW_WORKER_NAME: ${{ env.PREVIEW_WORKER_NAME }}
